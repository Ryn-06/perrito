<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mascota Virtual ASCII</title>

<style>
body{
    font-family: monospace;
    text-align:center;
    background:#f4f9ff;
}
button{
    padding:12px 20px;
    font-size:16px;
    margin:10px;
}
#log{
    margin-top:20px;
    white-space:pre-line;
}
#dog{
    white-space:pre;
    font-size:16px;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>Mascota Virtual</h1>

<button onclick="iniciarPartida()">Iniciar Partida</button>

<h2 id="energia"></h2>
<h3 id="record"></h3>

<div id="dog"></div>
<div id="log"></div>

<script>

class Mascota{
    constructor(nombre){
        this.nombre = nombre;
        this.energia = 1000;
        this.estaBien = true;
    }

    chequearEnergia(){
        if(this.energia <= 0){
            this.energia = 0;
            this.estaBien = false;
            agregarLog(this.nombre + " se ha quedado sin energía...");
            mostrarPerroMuerto();
            finalizarPartida();
        }
    }

    comer(){
        this.energia += 300;
        agregarLog(this.nombre + " ha comido.");
    }

    caminar(){
        if(this.energia >= 200){
            this.energia -= 200;
            agregarLog(this.nombre + " caminó.");
        }else{
            agregarLog(this.nombre + " no tiene suficiente energía.");
        }
        this.chequearEnergia();
    }

    enfermarse(){
        let perdida = Math.floor(Math.random()*1001);
        this.energia -= perdida;
        agregarLog(this.nombre + " se enfermó y perdió " + perdida);
        this.chequearEnergia();
    }

    descansar(){
        let ganancia = Math.floor(Math.random()*501);
        this.energia += ganancia;
        agregarLog(this.nombre + " descansó y ganó " + ganancia);
        this.chequearEnergia();
    }
}

class Perro extends Mascota{
    ladrar(){
        if(this.estaBien){
            agregarLog(this.nombre + " dice: ¡Guau! ¡Guau!");
            mostrarPerroNormal();
        }else{
            agregarLog(this.nombre + " está demasiado débil para ladrar.");
            mostrarPerroMuerto();
            finalizarPartida();
        }
    }
}

let miPerro;
let intervalo;
let record = localStorage.getItem("recordEnergia") || 1000;

document.getElementById("record").innerText =
"Récord de energía: " + record;

function agregarLog(texto){
    document.getElementById("log").innerText += texto + "\n";
    document.getElementById("energia").innerText =
    "Energía actual: " + miPerro.energia;

    if(miPerro.energia > record){
        record = miPerro.energia;
        localStorage.setItem("recordEnergia", record);
        document.getElementById("record").innerText =
        "Récord de energía: " + record;
    }
}

function mostrarPerroNormal(){
document.getElementById("dog").innerText = `
  / \\__
 (    @\\___
 /         O
/   (_____/
/_____/   U
`;
}

function mostrarPerroMuerto(){
document.getElementById("dog").innerText = `
  / \\__
 (    >\\___
 /         _
/   (_____/
/_____/   U
`;
}

function finalizarPartida(){
    clearInterval(intervalo);
    agregarLog("La partida ha terminado.");
}

function iniciarPartida(){

    document.getElementById("log").innerText = "";
    miPerro = new Perro("Hope");
    mostrarPerroNormal();

    agregarLog("Estado inicial: 1000 de energía.");

    let c = 0;
    let d = 0;
    let b = Math.floor(Math.random()*11) + 5;
    let contador = 0;

    clearInterval(intervalo);

    intervalo = setInterval(() => {

        if(contador >= b || !miPerro.estaBien){
            miPerro.ladrar();
            return;
        }

        let a = Math.floor(Math.random()*5);

        if(a === 1){
            miPerro.ladrar();
        }
        else if(a === 2){
            miPerro.caminar();
            c++;
        }
        else if(a === 3){
            miPerro.comer();
            d++;
        }
        else if((a === 4 && d === 1) || c === 1){
            miPerro.descansar();
            d = 0;
            c = 0;
        }
        else{
            miPerro.enfermarse();
        }

        contador++;

    }, 1500);
}

</script>

</body>
</html>
