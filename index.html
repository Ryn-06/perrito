<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mascota Virtual</title>

<style>

body{
    margin:0;
    font-family: 'Courier New', monospace;
    background: linear-gradient(135deg, #74ebd5, #acb6e5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    background:white;
    width:500px;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:10px;
}

button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#45a049;
    transform:scale(1.05);
}

#energia{
    font-weight:bold;
    margin-top:15px;
    color:#444;
}

#record{
    color:#888;
    font-size:14px;
}

#perrito{
    font-size:70px;
    margin:20px 0;
    transition:0.3s;
}

#log{
    background:#f4f4f4;
    padding:10px;
    border-radius:10px;
    height:120px;
    overflow:auto;
    text-align:left;
    font-size:14px;
}

.perro-feliz{
    color:#ff9800;
}

.perro-debil{
    color:#999;
}

</style>
</head>
<body>

<div class="contenedor">

<h1>🐶 Mascota Virtual</h1>

<button onclick="iniciarPartida()">Iniciar Partida</button>

<div id="energia"></div>
<div id="record"></div>

<div id="perrito"></div>

<div id="log"></div>

</div>

<script>

class Mascota{
    constructor(nombre){
        this.nombre = nombre;
        this.energia = 1000;
        this.estaBien = true;
    }

    chequearEnergia(){
        if(this.energia <= 0){
            this.energia = 0;
            this.estaBien = false;
            agregarLog(this.nombre + " se ha quedado sin energía...");
            mostrarPerroDebil();
        }
    }

    comer(){
        this.energia += 300;
        agregarLog(this.nombre + " ha comido. Energía: " + this.energia);
    }

    caminar(){
        if(this.energia >= 200){
            this.energia -= 200;
            agregarLog(this.nombre + " caminó. Energía: " + this.energia);
        }else{
            agregarLog(this.nombre + " no tiene suficiente energía.");
        }
        this.chequearEnergia();
    }

    enfermarse(){
        let perdida = Math.floor(Math.random()*1001);
        this.energia -= perdida;
        agregarLog(this.nombre + " se enfermó y perdió " + perdida +
        ". Energía: " + this.energia);
        this.chequearEnergia();
    }

    descansar(){
        let ganancia = Math.floor(Math.random()*501);
        this.energia += ganancia;
        agregarLog(this.nombre + " descansó y ganó " + ganancia +
        ". Energía: " + this.energia);
        this.chequearEnergia();
    }
}

class Perro extends Mascota{
    ladrar(){
        if(this.estaBien){
            agregarLog(this.nombre + " dice: ¡Guau! ¡Guau!");
            mostrarPerroFeliz();
        }else{
            agregarLog(this.nombre + " está demasiado débil para ladrar.");
            mostrarPerroDebil();
            clearInterval(intervalo);
        }
    }
}

let miPerro;
let intervalo;
let record = localStorage.getItem("recordEnergia") || 1000;

document.getElementById("record").innerText =
"Récord de energía: " + record;

function agregarLog(texto){
    document.getElementById("log").innerText += texto + "\n";
    document.getElementById("energia").innerText =
    "Energía actual: " + miPerro.energia;

    if(miPerro.energia > record){
        record = miPerro.energia;
        localStorage.setItem("recordEnergia", record);
        document.getElementById("record").innerText =
        "Récord de energía: " + record;
    }
}

function mostrarPerroFeliz(){
    let p = document.getElementById("perrito");
    p.className = "perro-feliz";
    p.innerText = `
  /\\_/\\
 ( ^.^ )
  >  ^  <
`;
}

function mostrarPerroDebil(){
    let p = document.getElementById("perrito");
    p.className = "perro-debil";
    p.innerText = `
  /\\_/\\
 ( >.< )
  >  ~  <
`;
}

function iniciarPartida(){

    document.getElementById("log").innerText = "";
    miPerro = new Perro("Hope");

    mostrarPerroFeliz();
    agregarLog("Estado inicial: 1000 de energía.");

    let c = 0;
    let d = 0;
    let b = Math.floor(Math.random()*11) + 5;
    let contador = 0;

    clearInterval(intervalo);

    intervalo = setInterval(() => {

        if(contador >= b){
            clearInterval(intervalo);
            miPerro.ladrar();
            return;
        }

        let a = Math.floor(Math.random()*5);

        if(a === 1){
            miPerro.ladrar();
        }
        else if(a === 2){
            miPerro.caminar();
            c++;
        }
        else if(a === 3){
            miPerro.comer();
            d++;
        }
        else if((a === 4 && d === 1) || c === 1){
            miPerro.descansar();
            d = 0;
            c = 0;
        }
        else{
            miPerro.enfermarse();
        }

        contador++;

    }, 1500);
}

</script>

</body>
</html>
