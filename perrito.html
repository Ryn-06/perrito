<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mascota Virtual</title>

<style>
  body{
    font-family: Arial;
    text-align: center;
    background:#e3f2fd;
  }

  #pantallaJuego{
    display:none;
  }

  button{
    padding:10px 20px;
    margin:8px;
    font-size:16px;
  }
</style>
</head>
<body>

<!-- PANTALLA INICIAL -->
<div id="pantallaInicio">
  <h1>🐶 Mascota Virtual</h1>
  <button onclick="iniciarPartida()">Iniciar Partida</button>
</div>

<!-- PANTALLA DEL JUEGO -->
<div id="pantallaJuego">
  <h2 id="energia"></h2>
  <p id="mensaje"></p>

  <button onclick="ladrar()">Ladrar</button>
  <button onclick="caminar()">Caminar</button>
  <button onclick="comer()">Comer</button>
  <button onclick="descansar()">Descansar</button>
  <button onclick="enfermarse()">Enfermarse</button>
</div>

<script>

class Mascota{
  constructor(nombre){
    this.nombre = nombre;
    this.energia = 1000;
    this.estaBien = true;
  }

  actualizarPantalla(mensaje){
    document.getElementById("energia").textContent =
      `Energía de ${this.nombre}: ${this.energia}`;
    document.getElementById("mensaje").textContent = mensaje;
  }

  chequearEnergia(){
    if(this.energia <= 0){
      this.energia = 0;
      this.estaBien = false;
      this.actualizarPantalla("Se quedó sin energía...");
    }
  }

  comer(){
    if(this.estaBien){
      this.energia += 300;
      this.actualizarPantalla("Ha comido.");
    }
  }

  caminar(){
    if(this.estaBien){
      if(this.energia >= 200){
        this.energia -= 200;
        this.actualizarPantalla("Caminó.");
      }else{
        this.actualizarPantalla("No tiene suficiente energía.");
      }
      this.chequearEnergia();
    }
  }

  descansar(){
    if(this.estaBien){
      let ganancia = Math.floor(Math.random()*500);
      this.energia += ganancia;
      this.actualizarPantalla("Descansó.");
      this.chequearEnergia();
    }
  }

  enfermarse(){
    if(this.estaBien){
      let perdida = Math.floor(Math.random()*1000);
      this.energia -= perdida;
      this.actualizarPantalla("Se enfermó.");
      this.chequearEnergia();
    }
  }
}

class Perro extends Mascota{
  ladrar(){
    if(this.estaBien){
      this.actualizarPantalla("¡Guau! ¡Guau!");
    }else{
      this.actualizarPantalla("Está demasiado débil.");
    }
  }
}

let miPerro;

function iniciarPartida(){
  document.getElementById("pantallaInicio").style.display = "none";
  document.getElementById("pantallaJuego").style.display = "block";

  miPerro = new Perro("Hope");
  miPerro.actualizarPantalla("Estado inicial.");
}

function ladrar(){ miPerro.ladrar(); }
function caminar(){ miPerro.caminar(); }
function comer(){ miPerro.comer(); }
function descansar(){ miPerro.descansar(); }
function enfermarse(){ miPerro.enfermarse(); }

</script>

</body>
</html>
